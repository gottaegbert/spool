name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Spool
        2. Search for '...'
        3. See error
  - type: input
    id: version
    attributes:
      label: Spool version
      placeholder: e.g. 0.1.0
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.3
